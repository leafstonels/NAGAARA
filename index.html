<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Magazine Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg-primary: #fdfbf7;
  --bg-secondary: #f1ece4;
  --bg-surface: #ffffff;
  --text-primary: #333;
  --text-secondary: #777; 
  --accent: #e94560;
  --accent-hover: #ff6b81;
  --page-width: 400px;
  --page-height: 560px;
  --flip-duration: 0.8s;
  --shadow-color: rgba(0,0,0,0.4);
  --spine-shadow: rgba(0,0,0,0.25);
  --paper-color: #f5f0e8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: radial-gradient(circle at center, #fdfbf7 0%, #f1ece4 100%);
  color: #333;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ===== Loader ===== */
#loader {
  position: fixed; inset: 0;
  background: var(--bg-primary);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 10000;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}
#loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
#loader .spinner {
  width: 56px; height: 56px;
  border: 4px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader .load-text {
  margin-top: 20px; font-size: 14px; color: var(--text-secondary);
  letter-spacing: 2px; text-transform: uppercase;
}
#loader .progress-bar {
  width: 200px; height: 3px; background: rgba(255,255,255,0.1);
  border-radius: 3px; margin-top: 16px; overflow: hidden;
}
#loader .progress-fill {
  height: 100%; width: 0%; background: var(--accent);
  border-radius: 3px; transition: width 0.3s ease;
}

/* ===== Toolbar ===== */
#toolbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 52px;
  background: rgba(15,15,30,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
#toolbar .title {
  font-size: 15px; font-weight: 600; letter-spacing: 0.5px;
}
#toolbar .controls { display: flex; align-items: center; gap: 8px; }
.tb-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-primary);
  padding: 6px 14px; border-radius: 6px;
  font-size: 13px; cursor: pointer;
  transition: all 0.2s;
}
.tb-btn:hover { background: rgba(255,255,255,0.15); }
.tb-btn.active { background: var(--accent); border-color: var(--accent); }
#page-indicator {
  font-size: 13px; color: var(--text-secondary);
  min-width: 80px; text-align: center;
}

/* ===== Main Container ===== */
#viewer {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding-top: 0;
}

/* ===== Book (Double Page Mode) ===== */
#book-container {
  perspective: 2500px;
  display: flex; align-items: center; justify-content: center;
}
#book {
  position: relative;
  width: calc(var(--page-width) * 2);
  height: var(--page-height);
  transform-style: preserve-3d;
  transition: transform 0.5s ease;
}

@media (max-width: 768px) {
  #book {
    transform: scale(0.7);
  }
}

/* Spine shadow */
#book::after {
  content: '';
  position: absolute;
  top: 0; left: 50%; width: 4px; height: 100%;
  transform: translateX(-50%);
  background: linear-gradient(to right, var(--spine-shadow), transparent 40%, transparent 60%, var(--spine-shadow));
  z-index: 1000;
  pointer-events: none;
}
/* Book shadow */
#book-container::after {
  content: '';
  position: absolute;
  bottom: -30px;
  width: calc(var(--page-width) * 1.6);
  height: 20px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.35), transparent 70%);
  pointer-events: none;
}

.leaf {
  position: absolute;
  top: 0;
  right: 0;
  width: var(--page-width);
  height: var(--page-height);
  transform-style: preserve-3d;
  transform-origin: left center;
  transition: transform var(--flip-duration) ease-in-out, z-index 0s;
}
.leaf.flipped { transform: rotateY(-180deg); }

.page {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
  background: var(--paper-color);
  display: flex; align-items: center; justify-content: center;
}
/* Paper texture overlay - subtle noise only */
.page::before {
  content: '';
  position: absolute; inset: 0;
  background: none;
  pointer-events: none;
  z-index: 2;
}
/* Page curvature illusion */
.page::after {
  content: '';
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 3;
}
.page-front::after {
  background: linear-gradient(to right, rgba(0,0,0,0.06) 0%, transparent 8%, transparent 92%, rgba(0,0,0,0.03) 100%);
}
.page-back {
  transform: rotateY(180deg);
}
.page-back::after {
  background: linear-gradient(to left, rgba(0,0,0,0.06) 0%, transparent 8%, transparent 92%, rgba(0,0,0,0.03) 100%);
}

.page canvas {
  max-width: 100%; max-height: 100%;
  display: block;
}
.page .empty-page {
  width: 100%; height: 100%;
  background: var(--paper-color);
}

/* ===== Single Page Mode ===== */
#single-container {
  display: none;
  position: relative;
  width: var(--page-width);
  height: var(--page-height);
  overflow: hidden;
  border-radius: 4px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#single-container .single-page {
  position: absolute; inset: 0;
  background: var(--paper-color);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.4s ease, opacity 0.4s ease;
}
#single-container .single-page canvas {
  max-width: 100%; max-height: 100%;
}

/* ===== Navigation Buttons ===== */
.nav-btn {
  position: fixed; top: 50%;
  transform: translateY(-50%);
  width: 48px; height: 48px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--text-primary);
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  z-index: 50;
}
.nav-btn:hover { background: rgba(255,255,255,0.18); transform: translateY(-50%) scale(1.08); }
.nav-btn:disabled { opacity: 0.2; cursor: default; transform: translateY(-50%); }
#btn-prev { left: 16px; }
#btn-next { right: 16px; }

/* ===== Thumbnail Sidebar ===== */
#sidebar {
  position: fixed; top: 52px; right: 0; bottom: 0;
  width: 0; overflow: hidden;
  background: rgba(15,15,30,0.92);
  backdrop-filter: blur(12px);
  transition: width 0.3s ease;
  z-index: 90;
  display: flex; flex-direction: column;
}
#sidebar.open { width: 160px; }
#sidebar .sidebar-inner {
  padding: 12px;
  overflow-y: auto; flex: 1;
  display: flex; flex-direction: column; gap: 8px;
}
.thumb-item {
  cursor: pointer;
  border: 2px solid transparent;
  border-radius: 4px;
  overflow: hidden;
  transition: border-color 0.2s;
  background: var(--paper-color);
}
.thumb-item:hover { border-color: rgba(255,255,255,0.3); }
.thumb-item.active { border-color: var(--accent); }
.thumb-item canvas {
  width: 100%; display: block;
}
.thumb-label {
  font-size: 10px; text-align: center;
  padding: 2px 0; color: var(--text-secondary);
}

/* ===== Zoom Overlay ===== */
#zoom-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 200;
  display: none;
  align-items: center; justify-content: center;
  cursor: zoom-out;
}
#zoom-overlay.active { display: flex; }
#zoom-overlay canvas {
  max-width: 95vw; max-height: 95vh;
  box-shadow: 0 0 80px rgba(0,0,0,0.5);
}

/* ===== Responsive Scaling ===== */
@media (max-width: 900px) {
  :root {
    --page-width: 300px;
    --page-height: 420px;
  }
}
@media (max-width: 600px) {
  :root {
    --page-width: 85vw;
    --page-height: calc(85vw * 1.4);
  }
  .nav-btn { width: 40px; height: 40px; font-size: 16px; }
  #btn-prev { left: 6px; }
  #btn-next { right: 6px; }
}
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
  <div class="load-text">Loading Magazine</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>


<!-- Viewer Area -->
<div id="viewer">
  <div id="book-container">
    <div id="book"></div>
  </div>
  <div id="single-container"></div>
</div>

<!-- Nav Buttons -->
<button class="nav-btn" id="btn-prev" aria-label="Previous">◀</button>
<button class="nav-btn" id="btn-next" aria-label="Next">▶</button>

<!-- Floating Controls -->
<button id="btn-mode" class="nav-btn" style="top: 20px; right: 70px;">📖</button>
<button id="btn-thumbs" class="nav-btn" style="top: 20px; right: 16px;">☰</button>

<div id="page-indicator" style="
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 14px;
  color: #aaa;
  z-index: 100;
"></div>

<!-- Sidebar -->
<div id="sidebar"><div class="sidebar-inner" id="sidebar-inner"></div></div>

<!-- Zoom Overlay -->
<div id="zoom-overlay" id="zoom-overlay"></div>

<script type="module">
// ===== PDF.js Setup =====
const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

// ===== State =====
let pdfDoc = null;
let totalPages = 0;
let currentLeaf = 0;       // for double-page mode
let currentPage = 1;        // for single-page mode (1-indexed)
let isDoubleMode = true;
let isAnimating = false;
let pageCache = new Map();
let thumbCache = new Map();
let leaves = [];
let totalLeaves = 0;

// ===== DOM =====
const loader = document.getElementById('loader');
const progressFill = document.getElementById('progress-fill');
const bookEl = document.getElementById('book');
const bookContainer = document.getElementById('book-container');
const singleContainer = document.getElementById('single-container');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnMode = document.getElementById('btn-mode');
const btnThumbs = document.getElementById('btn-thumbs');
const pageIndicator = document.getElementById('page-indicator');
const sidebar = document.getElementById('sidebar');
const sidebarInner = document.getElementById('sidebar-inner');
const zoomOverlay = document.getElementById('zoom-overlay');

// ===== Audio (REAL flip sound) =====
const flipSound = new Audio('./flip.mp3');
flipSound.preload = 'auto';

function playFlipSound() {
  flipSound.currentTime = 0;
  flipSound.play().catch(() => {});
}

// ===== Render a PDF page to canvas =====
async function renderPage(pageNum, targetWidth, targetHeight) {
  const key = `${pageNum}-${targetWidth}`;
  if (pageCache.has(key)) return pageCache.get(key);

  const page = await pdfDoc.getPage(pageNum);
  const vp = page.getViewport({ scale: 1 });
  const scaleW = targetWidth / vp.width;
  const scaleH = targetHeight / vp.height;
  const scale = Math.min(scaleW, scaleH) * (window.devicePixelRatio || 1);
  const viewport = page.getViewport({ scale });

  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  canvas.style.width = (viewport.width / (window.devicePixelRatio || 1)) + 'px';
  canvas.style.height = (viewport.height / (window.devicePixelRatio || 1)) + 'px';

  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;

  pageCache.set(key, canvas);
  return canvas;
}

// ===== Get page dimensions from CSS =====
function getPageDims() {
  const temp = document.createElement('div');
  temp.style.width = 'var(--page-width)';
  temp.style.height = 'var(--page-height)';
  temp.style.position = 'absolute'; temp.style.visibility = 'hidden';
  document.body.appendChild(temp);
  const w = temp.offsetWidth || 400;
  const h = temp.offsetHeight || 560;
  document.body.removeChild(temp);
  return { w, h };
}

// ===== Build leaf structure =====
// Leaf 0: front=page1 (cover), back=page2
// Leaf 1: front=page3, back=page4
// ...
function buildLeaves() {
  totalLeaves = Math.ceil(totalPages / 2);
  leaves = [];
  for (let i = 0; i < totalLeaves; i++) {
    leaves.push({
      frontPage: i * 2 + 1,   // odd
      backPage:  i * 2 + 2,   // even (may exceed totalPages)
    });
  }
}

// ===== Render Double Page Mode =====
async function renderBook() {
  bookEl.innerHTML = '';
  const { w, h } = getPageDims();

  for (let i = 0; i < totalLeaves; i++) {
    const leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.style.zIndex = totalLeaves - i;
    leaf.dataset.index = i;

    // Front page
    const front = document.createElement('div');
    front.className = 'page page-front';
    if (leaves[i].frontPage <= totalPages) {
      const canvas = await renderPage(leaves[i].frontPage, w, h);
      front.appendChild(canvas.cloneNode ? cloneCanvas(canvas) : canvas);
    } else {
      const empty = document.createElement('div');
      empty.className = 'empty-page';
      front.appendChild(empty);
    }

    // Back page
    const back = document.createElement('div');
    back.className = 'page page-back';
    if (leaves[i].backPage <= totalPages) {
      const canvas = await renderPage(leaves[i].backPage, w, h);
      back.appendChild(canvas.cloneNode ? cloneCanvas(canvas) : canvas);
    } else {
      const empty = document.createElement('div');
      empty.className = 'empty-page';
      back.appendChild(empty);
    }

    leaf.appendChild(front);
    leaf.appendChild(back);
    bookEl.appendChild(leaf);

    // Double-click zoom
    front.addEventListener('dblclick', () => zoomPage(leaves[i].frontPage));
    back.addEventListener('dblclick', () => zoomPage(leaves[i].backPage));
  }

  // Apply flipped state
  updateBookState();
}

function cloneCanvas(original) {
  const clone = document.createElement('canvas');
  clone.width = original.width;
  clone.height = original.height;
  clone.style.width = original.style.width;
  clone.style.height = original.style.height;
  clone.getContext('2d').drawImage(original, 0, 0);
  return clone;
}

function fitBookToScreen() {
  const container = document.getElementById('book-container');
  const book = document.getElementById('book');

  const scaleX = container.clientWidth / book.offsetWidth;
  const scaleY = container.clientHeight / book.offsetHeight;

  const scale = Math.min(scaleX, scaleY, 1);

  book.style.transform = `scale(${scale})`;
}

function updateBookState() {
  const leafEls = bookEl.querySelectorAll('.leaf');
  leafEls.forEach((el, i) => {
    if (i < currentLeaf) {
      el.classList.add('flipped');
      el.style.zIndex = i + 1;
    } else {
      el.classList.remove('flipped');
      el.style.zIndex = totalLeaves - i;
    }
  });
  updateIndicator();
  preloadAdjacentDouble();
}

function preloadAdjacentDouble() {
  const { w, h } = getPageDims();
  // Preload next leaf pages
  for (let offset = -1; offset <= 1; offset++) {
    const li = currentLeaf + offset;
    if (li >= 0 && li < totalLeaves) {
      if (leaves[li].frontPage <= totalPages) renderPage(leaves[li].frontPage, w, h);
      if (leaves[li].backPage <= totalPages) renderPage(leaves[li].backPage, w, h);
    }
  }
}

// ===== Single Page Mode =====
async function renderSinglePage(direction = 0) {
  const { w, h } = getPageDims();

  if (currentPage < 1 || currentPage > totalPages) return;

  const newPage = document.createElement('div');
  newPage.className = 'single-page';

  const canvas = await renderPage(currentPage, w, h);
  newPage.appendChild(cloneCanvas(canvas));

  // Initial position (for animation)
  if (direction === 1) newPage.style.transform = 'translateX(100%)';
  else if (direction === -1) newPage.style.transform = 'translateX(-100%)';
  else newPage.style.transform = 'translateX(0)';

  singleContainer.appendChild(newPage);

  // Animate
  requestAnimationFrame(() => {
    newPage.style.transform = 'translateX(0)';
  });

  // Remove old page
  const oldPages = singleContainer.querySelectorAll('.single-page');
  if (oldPages.length > 1) {
    const oldPage = oldPages[0];
    oldPage.style.transform = direction === 1 ? 'translateX(-100%)' : 'translateX(100%)';
    oldPage.style.opacity = '0';

    setTimeout(() => oldPage.remove(), 300);
  }

  updateIndicator();
  preloadAdjacentSingle();
}
function preloadAdjacentSingle() {
  const { w, h } = getPageDims();
  for (let offset = -1; offset <= 1; offset++) {
    const p = currentPage + offset;
    if (p >= 1 && p <= totalPages) renderPage(p, w, h);
  }
}

// ===== Navigation =====
function nextPage() {
  if (isAnimating) return;
  playFlipSound();
  if (isDoubleMode) {
    if (currentLeaf >= totalLeaves) return;
    isAnimating = true;
    currentLeaf++;
    updateBookState();
    setTimeout(() => { isAnimating = false; }, parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--flip-duration')) * 1000 || 800);
  } else {
    if (currentPage >= totalPages) return;
    currentPage++;
    renderSinglePage(1);
  }
  updateNavButtons();
  updateThumbs();
}

function prevPage() {
  if (isAnimating) return;
  playFlipSound();
  if (isDoubleMode) {
    if (currentLeaf <= 0) return;
    isAnimating = true;
    currentLeaf--;
    updateBookState();
    setTimeout(() => { isAnimating = false; }, parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--flip-duration')) * 1000 || 800);
  } else {
    if (currentPage <= 1) return;
    currentPage--;
    renderSinglePage(-1);
  }
  updateNavButtons();
  updateThumbs();
}

function goToPage(pageNum) {
  if (isDoubleMode) {
    currentLeaf = Math.ceil(pageNum / 2);
    if (pageNum === 1) currentLeaf = 0;
    // For page N: leaf index = floor((N-1)/2), flipped means currentLeaf > leafIndex
    currentLeaf = Math.floor((pageNum - 1) / 2) + (pageNum % 2 === 0 ? 1 : 0);
    // Simpler: to see page N, flip all leaves before it
    currentLeaf = Math.ceil((pageNum) / 2);
    if (pageNum <= 1) currentLeaf = 0;
    if (pageNum >= totalPages) currentLeaf = totalLeaves;
    updateBookState();
  } else {
    currentPage = pageNum;
    renderSinglePage();
  }
  updateNavButtons();
  updateThumbs();
}

function updateNavButtons() {
  if (isDoubleMode) {
    btnPrev.disabled = currentLeaf <= 0;
    btnNext.disabled = currentLeaf >= totalLeaves;
  } else {
    btnPrev.disabled = currentPage <= 1;
    btnNext.disabled = currentPage >= totalPages;
  }
}

function updateIndicator() {
  if (isDoubleMode) {
    const leftPage = currentLeaf * 2;
    const rightPage = leftPage + 1;
    if (currentLeaf === 0) {
      pageIndicator.textContent = `Cover / ${totalPages}`;
    } else if (currentLeaf >= totalLeaves) {
      pageIndicator.textContent = `${totalPages} / ${totalPages}`;
    } else {
      const l = Math.min(leftPage, totalPages);
      const r = Math.min(rightPage, totalPages);
      pageIndicator.textContent = `${l}–${r} / ${totalPages}`;
    }
  } else {
    pageIndicator.textContent = `${currentPage} / ${totalPages}`;
  }
}

// ===== Mode Toggle =====
function toggleMode() {
  if (isDoubleMode) {
    // Switch to single
    isDoubleMode = false;
    // Determine current page from leaf
    currentPage = currentLeaf === 0 ? 1 : Math.min(currentLeaf * 2, totalPages);
    bookContainer.style.display = 'none';
    singleContainer.style.display = 'flex';
    singleContainer.style.alignItems = 'center';
    singleContainer.style.justifyContent = 'center';
    btnMode.textContent = isDoubleMode ? '📖' : '📄';
    renderSinglePage();
  } else {
    // Switch to double
    isDoubleMode = true;
    currentLeaf = Math.floor((currentPage - 1) / 2);
    if (currentPage % 2 === 0) currentLeaf = Math.ceil(currentPage / 2);
    bookContainer.style.display = 'flex';
    singleContainer.style.display = 'none';
    btnMode.textContent = isDoubleMode ? '📖' : '📄';
    updateBookState();
    fitBookToScreen();
  }
  updateNavButtons();
  updateThumbs();
}

// ===== Thumbnails =====
async function buildThumbnails() {
  sidebarInner.innerHTML = '';
  for (let i = 1; i <= totalPages; i++) {
    const item = document.createElement('div');
    item.className = 'thumb-item';
    item.dataset.page = i;

    const page = await pdfDoc.getPage(i);
    const vp = page.getViewport({ scale: 1 });
    const scale = 120 / vp.width;
    const viewport = page.getViewport({ scale });

    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    item.appendChild(canvas);
    const label = document.createElement('div');
    label.className = 'thumb-label';
    label.textContent = `Page ${i}`;
    item.appendChild(label);

    item.addEventListener('click', () => {
      currentPage = i;
      if (isDoubleMode) {
        goToPage(i);
      } else {
        renderSinglePage();
      }
      updateNavButtons();
      updateThumbs();
    });

    sidebarInner.appendChild(item);
  }
}

function updateThumbs() {
  const items = sidebarInner.querySelectorAll('.thumb-item');
  items.forEach(el => {
    const p = parseInt(el.dataset.page);
    if (isDoubleMode) {
      const visibleLeft = currentLeaf * 2;
      const visibleRight = visibleLeft + 1;
      el.classList.toggle('active', p === visibleLeft || p === visibleRight || (currentLeaf === 0 && p === 1));
    } else {
      el.classList.toggle('active', p === currentPage);
    }
  });
}

// ===== Zoom =====
async function zoomPage(pageNum) {
  if (pageNum < 1 || pageNum > totalPages) return;
  const page = await pdfDoc.getPage(pageNum);
  const vp = page.getViewport({ scale: 1 });
  const maxW = window.innerWidth * 0.93;
  const maxH = window.innerHeight * 0.93;
  const scale = Math.min(maxW / vp.width, maxH / vp.height) * (window.devicePixelRatio || 1);
  const viewport = page.getViewport({ scale });

  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  canvas.style.width = (viewport.width / (window.devicePixelRatio || 1)) + 'px';
  canvas.style.height = (viewport.height / (window.devicePixelRatio || 1)) + 'px';
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

  zoomOverlay.innerHTML = '';
  zoomOverlay.appendChild(canvas);
  zoomOverlay.classList.add('active');
}
zoomOverlay.addEventListener('click', () => zoomOverlay.classList.remove('active'));

// ===== Event Listeners =====
btnNext.addEventListener('click', nextPage);
btnPrev.addEventListener('click', prevPage);
window.addEventListener('resize', fitBookToScreen);
btnMode.addEventListener('click', toggleMode);
btnThumbs.addEventListener('click', () => sidebar.classList.toggle('open'));

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextPage(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevPage(); }
  if (e.key === 'Escape') { zoomOverlay.classList.remove('active'); sidebar.classList.remove('open'); }
});

// Touch swipe
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) nextPage(); else prevPage();
  }
}, { passive: true });

// Responsive: auto-switch mode
function checkResponsive() {
  const isMobile = window.innerWidth < 768;
  if (isMobile && isDoubleMode) toggleMode();
  else if (!isMobile && !isDoubleMode) toggleMode();
}

// ===== Initialize =====
async function init() {
  try {
    progressFill.style.width = '20%';
    const loadingTask = pdfjsLib.getDocument('magazine.pdf');
    loadingTask.onProgress = (data) => {
      if (data.total) {
        const pct = Math.min(20 + (data.loaded / data.total) * 60, 80);
        progressFill.style.width = pct + '%';
      }
    };
    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;
    progressFill.style.width = '85%';

    buildLeaves();

    // Detect initial mode
    isDoubleMode = window.innerWidth >= 768;
    if (isDoubleMode) {
      bookContainer.style.display = 'flex';
      singleContainer.style.display = 'none';
      btnMode.textContent = isDoubleMode ? '📖' : '📄';
      await renderBook();
      fitBookToScreen();
    } else {
      bookContainer.style.display = 'none';
      singleContainer.style.display = 'flex';
      singleContainer.style.alignItems = 'center';
      singleContainer.style.justifyContent = 'center';
      btnMode.textContent = isDoubleMode ? '📖' : '📄';
      await renderSinglePage();
    }

    progressFill.style.width = '100%';
    updateNavButtons();

    // Build thumbnails async
    buildThumbnails().then(updateThumbs);

    // Hide loader
    setTimeout(() => loader.classList.add('hidden'), 400);

  } catch (err) {
    console.error('Failed to load PDF:', err);
    document.getElementById('load-text')?.textContent;
    loader.querySelector('.load-text').textContent = 'Failed to load magazine.pdf';
    loader.querySelector('.spinner').style.display = 'none';
  }
}

init();
</script>
