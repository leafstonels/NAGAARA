<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Magazine Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            /* High-end Studio Lighting: Soft grey to pure white */
            --bg-gradient: radial-gradient(circle at center, #ffffff 0%, #e8e8e8 100%);
            --accent-color: #007aff; 
            --toolbar-bg: rgba(255, 255, 255, 0.85);
            --page-bg: #ffffff;
            --flip-speed: 0.7s;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: #333;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        /* 3D Scene Setup */
        .viewer-container {
            width: 100vw;
            height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 3000px;
            background: transparent;
        }

        /* The Book wrapper */
        /* The Book wrapper - Zoomed out for full visibility */
.book {
    width: 380px;  /* Slightly narrower base */
    height: 537px; /* Scaled down A4 ratio */
    position: absolute;
    left: 50%;
    transform-style: preserve-3d;
    
    /* ADDED SCALE HERE: Adjust 0.85 to 0.7 if you want it even smaller */
    transform: translateX(-50%) scale(0.85); 
    
    transition: transform var(--flip-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
    filter: drop-shadow(0 20px 50px rgba(0,0,0,0.12));
}

        .leaf {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform var(--flip-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .leaf.flipped { transform: rotateY(-180deg); }

        .page {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            background-color: var(--page-bg);
            /* Paper Texture effect */
            background-image: url("https://www.transparenttextures.com/patterns/cream-paper.png");
            border: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .page.back { transform: rotateY(180deg); }

        /* Spine Shadows */
        .page.front::after {
            content: ""; position: absolute; top: 0; left: 0; bottom: 0; width: 40px;
            background: linear-gradient(to right, rgba(0,0,0,0.05) 0%, transparent 100%);
        }

        .page.back::after {
            content: ""; position: absolute; top: 0; right: 0; bottom: 0; width: 40px;
            background: linear-gradient(to left, rgba(0,0,0,0.05) 0%, transparent 100%);
        }

        canvas { width: 100%; height: 100%; object-fit: contain; }

        /* UI Toolbar */
       /* UI Toolbar - Apple Glass Style */
/* Individual Floating Buttons */
/* Small, Ultra-Transparent Floating Buttons */
.floating-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;  /* Reduced size */
    height: 40px; /* Reduced size */
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05); /* Almost invisible */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: rgba(0, 0, 0, 0.4); /* Subtle arrow color */
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1000;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}

.floating-btn.prev { left: 20px; }
.floating-btn.next { right: 20px; }

.floating-btn:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.8);
    color: #000;
    transform: translateY(-50%) scale(1.1);
}

/* Hide button when it can't be used (e.g. no more pages) */
.floating-btn:disabled {
    opacity: 0;
    pointer-events: none;
    transform: translateY(-50%) scale(0.8);
}
        /* Loader Overlay */
        #init-loader {
            position: fixed; inset: 0; background: #fff; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3; border-top: 4px solid var(--accent-color);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="init-loader">
    <div class="spinner"></div>
    <h2 style="margin-top: 20px;">Loading Magazine...</h2>
</div>

<div class="viewer-container">
    <div id="book" class="book"></div>
</div>

<button id="prev-btn" class="floating-btn prev" disabled aria-label="Previous Page">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
</button>

<button id="next-btn" class="floating-btn next" disabled aria-label="Next Page">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
</button>
<script>
    const pdfUrl = './magazine.pdf';
    const flipSound = new Audio('./flip.mp3');
    flipSound.preload = 'auto';

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null, totalLeaves = 0, currentLeaf = 0, isAnimating = false, leavesDOM = [];
    const renderedPages = new Set();
    const bookEl = document.getElementById('book'), pageInfoEl = document.getElementById('page-info');
    const prevBtn = document.getElementById('prev-btn'), nextBtn = document.getElementById('next-btn');

    function playFlipSound() {
        flipSound.currentTime = 0;
        flipSound.play().catch(e => console.log("Audio waiting for interaction"));
    }

    async function initPDF() {
        try {
            pdfDoc = await pdfjsLib.getDocument(pdfUrl).promise;
            totalLeaves = Math.ceil(pdfDoc.numPages / 2);
            buildDOM();
            updateZIndexes();
            updateBookPosition();
            renderVisiblePages();
            updateUI();

            const loader = document.getElementById('init-loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
        } catch (err) {
            document.getElementById('init-loader').innerHTML = `<h2>Error</h2><p>${err.message}</p>`;
        }
    }

    function buildDOM() {
        for (let i = 0; i < totalLeaves; i++) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            const fNum = i * 2 + 1, bNum = i * 2 + 2;
            leaf.innerHTML = `
                <div class="page front ${fNum > pdfDoc.numPages ? 'blank' : ''}">
                    ${fNum <= pdfDoc.numPages ? `<canvas id="canvas-${fNum}"></canvas>` : ''}
                </div>
                <div class="page back ${bNum > pdfDoc.numPages ? 'blank' : ''}">
                    ${bNum <= pdfDoc.numPages ? `<canvas id="canvas-${bNum}"></canvas>` : ''}
                </div>`;
            bookEl.appendChild(leaf);
            leavesDOM.push(leaf);
        }
    }

    function updateZIndexes() {
        leavesDOM.forEach((leaf, i) => {
            leaf.style.zIndex = i < currentLeaf ? i + 1 : totalLeaves - i;
        });
    }

    function updateBookPosition() {
       
    const scale = 0.85; // Matches the scale in your CSS
    
    if (currentLeaf === 0) {
        // Closed (Cover)
        bookEl.style.transform = `translateX(-50%) scale(${scale})`;
    } else if (currentLeaf === totalLeaves) {
        // Closed (Back Cover)
        bookEl.style.transform = `translateX(50%) scale(${scale})`;
    } else {
        // Open (Spread)
        bookEl.style.transform = `translateX(0) scale(${scale})`;
    }
}
    

    async function renderPage(num) {
        if (num < 1 || num > pdfDoc.numPages || renderedPages.has(num)) return;
        renderedPages.add(num);
        const canvas = document.getElementById(`canvas-${num}`);
        if (!canvas) return;
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: 2 });
        canvas.width = viewport.width; canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }

    function renderVisiblePages() {
        [currentLeaf*2, currentLeaf*2+1, currentLeaf*2+2, currentLeaf*2+3].forEach(renderPage);
    }

    function updateUI() {
    // Only handle button states
    if (prevBtn) prevBtn.disabled = currentLeaf === 0;
    if (nextBtn) nextBtn.disabled = currentLeaf === totalLeaves;
    
    // Page info update removed as element no longer exists
}
    

    function handleFlip(dir) {
        if (isAnimating || (dir === 1 && currentLeaf >= totalLeaves) || (dir === -1 && currentLeaf <= 0)) return;
        isAnimating = true;
        playFlipSound();

        const leaf = leavesDOM[dir === 1 ? currentLeaf : currentLeaf - 1];
        leaf.style.zIndex = 100;

        if (dir === 1) {
            leaf.classList.add('flipped');
            currentLeaf++;
        } else {
            leaf.classList.remove('flipped');
            currentLeaf--;
        }

        updateBookPosition();
        renderVisiblePages();
        updateUI();

        setTimeout(() => {
            isAnimating = false;
            updateZIndexes();
        }, 700);
    }

    nextBtn.onclick = () => handleFlip(1);
    prevBtn.onclick = () => handleFlip(-1);
    
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') handleFlip(1);
        if (e.key === 'ArrowLeft') handleFlip(-1);
    });

    initPDF();
</script>
</body>
</html>
